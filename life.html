<canvas id="life" width="600" height="500" style="border: 1px solid black;
background-color: black;
"></canvas>
<script>
m=document.getElementById("life").getContext('2d')
draw=(x,y,c,s)=>{
    m.fillStyle=c
    m.fillRect(x,y,s,s)
}


particle=(x,y,c)=>{
    return{"x":x,"y":y,"vx":0,"vy":0,"color":c}
}
particles=[]

random=()=>{
    return Math.random()*400+50
 }
create=(number,color)=>{
    group=[]
    for(let i=0;i<number;i++){
        group.push(particle(random(),random(),color))
        particles.push(group[i])
    }
    return group
}
rule=(particles1,particles2,g)=>{
    for(let i=0;i<particles1.length;i++){
         fx=0
         fy=0
         for(let j=0;j<particles2.length;j++){
        

             a=particles1[i]
             b=particles2[j]
             dx=a.x-b.x
             dy=a.y-b.y
             d=Math.sqrt(dx*dx+dy*dy)
             if(d>80){
                 F=g*1/d
    
                 fx+=(F*dx)*0.4
                 fy+=(F*dy)*0.4
          } else {
             let repulse = 0.5;
             fx -= repulse * dx;
             fy -= repulse * dy;
}

        }
     
   
         a.vx=(a.vx+fx)*0.4
         a.vy=(a.vy+fy)*0.4

    
         a.x+=a.vx
         a.y+=a.vy
         if (a.x < 0 || a.x > 600) a.vx *= -1;
         if (a.y < 0 || a.y > 500) a.vy *= -1;
    }
}
    
        
    
yellow=create(500,"yellow")
red=create(100,"red")
green=create(100,"green")
purple=create(100,"purple")
white=create(100,"white")
update=()=>{
    rule(yellow,yellow,-0.00001)
    rule(red,red,-0.001)
    rule(yellow,red,-0.001)
    rule(green,green,-0.001)
    rule(yellow,green,-0.001)
    rule(purple,purple,-0.01)
    rule(yellow,purple,-0.01)
    rule(red,green,-0.01)
    rule(red,purple,-0.01)
    rule(green,purple,-0.01)
    rule(red,white,-0.01)
    rule(green,white,-0.01)
    rule(white,white,-0.01)
    m.clearRect(0,0,600,500)
    m.fillStyle='black'
    for(let i=0;i<particles.length;i++){
        draw(particles[i].x,particles[i].y,particles[i].color,5)
    }
    requestAnimationFrame(update)
}
update();   



</script>
